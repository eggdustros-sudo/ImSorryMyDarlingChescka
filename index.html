<!DOCTYPE html>
<html>
<head>
    <title>Im Sorry Baby.</title>

    <style>
        body {
            margin: 10px;
            min-height: 100vh;
            background: Black;
            color: goldenrod;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 360px;
            min-height: 260px;
            background: hotpink;
            border-radius: 24px;
            border: 5px solid White;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .box h1 {
            margin: 0 0 12px;
            font-size: 28px;
            letter-spacing: 1px;
            color: black;
            text-shadow: 0 0 8px white;
            cursor: pointer;
        }

        .box p {
            margin: 0;
            color: black;
            font-size: 16px;
            min-height: 80px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }

        .box h1:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1 id="clickTarget">CLICK HERE</h1>
        <p id="text">Tap the big letters to read the message.</p>
    </div>

    <audio id="TypeSound">
        <source src="CLicking.wav" type="audio/mpeg">
    </audio>
    <script>

const messages = [
    "Hello Baby, I’m Sorry For What Happened Last Night. I know I was Being A Jerk.",
    "I Just Want You To Know That I Care About You A lot And I Want To Make Things Right Between Us.",
    "I Know I Messed Up And I Want To Do Better. Please Forgive Me And Give Me A Chance To Show You How Much I Care About you.",
    "I Promise To Be More Understanding And Supportive In The Future. I Love you And I Want To Make Things Work Between Us."
];"Im Very Sorry For What Happened Baby, I Love You so much."
"-Jayden."

const spacedMessages = messages.map(msg => msg.split("").join(" "));

let index = 0;
let typing = false;

function typeMessage(message) {

    if (typing) return;

    typing = true;

    const textElement = document.getElementById("text");
    const sound = document.getElementById("TypeSound");

    textElement.innerText = "";

    let i = 0;

    const interval = setInterval(() => {

        textElement.innerText += message[i];

        sound.currentTime = 0;
        sound.play();

        i++;

        if (i >= message.length) {
            clearInterval(interval);
            typing = false;
        }

    }, 50); // typing speed

}

const clickTarget = document.getElementById("clickTarget");
clickTarget.addEventListener("click", () => {
    typeMessage(spacedMessages[index]);
    index = (index + 1) % spacedMessages.length;
});

</script>

</body>
</html>
